spring.application.name=helloapp
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/studentdb
spring.datasource.username=root
spring.datasource.password=Chitti@01

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.sql.init.mode=always
spring.sql.init.platform=mysql

spring.kafka.bootstrap-servers=localhost:9092

#  Producer uses JSON
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.listener.auto-startup=false

jwt.secret=ChangeThisJwtSecretToAStrongValueWith32Bytes!
jwt.expiration-millis=3600000
security.admin.code=AdminSignup2026

# Debug logging for troubleshooting
logging.level.org.springframework.security=DEBUG
logging.level.com.cscorner.helloapp.security=DEBUG

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
logging.level.org.springframework.cache=TRACE
